version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: portal_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=event_portal
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal_api_server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/event_portal
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pg_data:
