services:
  # ----------------------------------------
  # BACKEND API (Express server)
  # ----------------------------------------
  - type: web
    name: chanakya-api-server
    env: node
    region: singapore # or ohio, frankfurt, oregon
    buildCommand: pnpm install && pnpm --filter @workspace/api-server build
    startCommand: cd artifacts/api-server && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        sync: false # You will provide this in Render Dashboard

  # ----------------------------------------
  # FRONTEND PORTAL (React/Vite)
  # ----------------------------------------
  - type: web
    name: chanakya-frontend
    env: static
    region: singapore
    buildCommand: pnpm install && pnpm --filter @workspace/event-portal build
    staticPublishPath: artifacts/event-portal/dist/public
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: chanakya-api-server
          envVarKey: RENDER_EXTERNAL_URL
